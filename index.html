<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f5f0;color:#222;min-height:100vh;font-size:15px}
.page-wrapper{max-width:794px;margin:0 auto;background:#f5f5f0}
.lang-bar{background:#fff;border-bottom:1px solid #ddd;padding:8px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.lang-btn{background:none;border:1px solid #ccc;border-radius:20px;padding:4px 14px;cursor:pointer;font-size:13px;color:#555}
.lang-btn.active{background:#E8611A;color:#fff;border-color:#E8611A}
header{background:#fff;border-bottom:1px solid #ddd;padding:10px 16px;display:flex;flex-direction:column;align-items:center;gap:3px}
.header-title{font-size:15px;font-weight:700;color:#E8611A;text-align:center}
.header-sub{font-size:12px;color:#888;text-align:center}
.version-tag{font-size:10px;color:#bbb;margin-top:2px}
.intro-box{background:#fff8f5;border:1px solid #f5c0a0;border-radius:10px;padding:14px 16px;margin:12px 16px;font-size:14px;line-height:1.7;color:#333;white-space:pre-line}
.step-content{padding:0 16px 140px}
.step-title{font-size:19px;font-weight:700;margin:18px 0 14px;color:#222}
.field-group{margin-bottom:14px}
.field-label{font-size:14px;color:#444;margin-bottom:5px;line-height:1.5}
.required{color:#E8611A}
.field-input{width:100%;border:1px solid #ccc;border-radius:8px;padding:10px 12px;font-size:15px;font-family:Arial;outline:none;color:#222;background:#fff}
.field-input:focus{border-color:#E8611A}
.radio-group{display:flex;gap:10px;margin-top:4px;flex-wrap:wrap}
.radio-option{display:flex;align-items:center;gap:6px;background:#fff;border:1px solid #ccc;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:14px}
.radio-option.selected{border-color:#E8611A;background:#fff8f5}
.radio-option input{accent-color:#E8611A;pointer-events:none}
.checkbox-item{background:#fff;border:1px solid #ddd;border-radius:8px;padding:11px 14px;margin-bottom:7px;display:flex;align-items:center;justify-content:flex-end;gap:10px;cursor:pointer;font-size:14px;flex-direction:row-reverse}
.checkbox-item input[type=checkbox]{accent-color:#E8611A;width:18px;height:18px;cursor:pointer;flex-shrink:0}
.checkbox-item:has(input:checked){border-color:#E8611A;background:#fff8f5}
.notice-box{background:#fff3e0;border:1px solid #ffe0b2;border-radius:8px;padding:11px 14px;font-size:13px;color:#555;margin:8px 0;line-height:1.6;white-space:pre-line}
.error-msg{color:#c0392b;font-size:12px;margin-top:5px;display:none}
.card-group{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
.type-card{background:#fff;border:1.5px solid #ddd;border-radius:10px;padding:12px 14px;cursor:pointer;text-align:center;font-size:14px;font-weight:700;transition:all .15s}
.type-card:hover{border-color:#E8611A}
.type-card.selected{border-color:#E8611A;background:#fff8f5;color:#E8611A}
.section-card{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:14px 16px;margin-bottom:12px}
.section-card-title{font-size:14px;font-weight:700;color:#E8611A;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.btn-remove{background:#fff;border:1px solid #e74c3c;color:#e74c3c;border-radius:6px;padding:3px 10px;font-size:12px;cursor:pointer}
.btn-add{background:#E8611A;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;cursor:pointer;font-weight:700}
.btn-add:hover{background:#d4551a}
.btn-group-row{display:flex;gap:8px;align-items:center;margin-top:10px;flex-wrap:wrap}
.file-label{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px dashed #ccc;border-radius:8px;padding:8px 14px;font-size:13px;color:#666;cursor:pointer;margin-top:6px}
.file-label:hover{border-color:#E8611A;color:#E8611A}
.file-label input[type=file]{display:none}
.file-preview{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.file-preview-item{display:flex;flex-direction:column;align-items:center;gap:2px}
.file-preview-item img{width:60px;height:60px;object-fit:cover;border-radius:6px;border:1px solid #ddd}
.file-preview-item span{font-size:11px;color:#888;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:794px;background:#fff;border-top:1px solid #ddd;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;box-shadow:0 -2px 8px rgba(0,0,0,0.07)}
.pager{font-size:13px;color:#888;white-space:nowrap;text-align:center;flex:1}
.btn{border:none;border-radius:8px;padding:11px 20px;font-size:14px;cursor:pointer;font-weight:700;white-space:nowrap}
.btn-next{background:#E8611A;color:#fff}
.btn-prev{background:#fff;color:#E8611A;border:2px solid #E8611A}
.textarea-field{width:100%;border:1px solid #ccc;border-radius:8px;padding:10px 12px;font-size:14px;font-family:Arial;min-height:80px;outline:none;resize:vertical;background:#fff}
.textarea-field:focus{border-color:#E8611A}
.summary-wrap{padding:0 16px 140px}
.summary-section{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:14px 16px;margin-bottom:10px}
.summary-section-title{font-size:14px;font-weight:700;color:#E8611A;margin-bottom:8px;border-bottom:1px solid #f0e0d8;padding-bottom:6px}
.summary-row{display:flex;gap:8px;font-size:13px;margin-bottom:6px;line-height:1.5}
.summary-label{color:#999;min-width:140px;flex-shrink:0;font-size:12px}
.summary-val{color:#222;flex:1}
.email-note{background:#e8f4f8;border:1px solid #b3d9e8;border-radius:8px;padding:10px 14px;font-size:13px;color:#1a5f7a;margin-top:16px;text-align:center}
.action-bar{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px;justify-content:center}
.btn-action{padding:12px 20px;font-size:14px;border-radius:10px;cursor:pointer;font-weight:700;border:none;display:flex;align-items:center;gap:6px}
.btn-pdf{background:#E8611A;color:#fff}
.btn-share{background:#2A5FA8;color:#fff}
.btn-copy{background:#555;color:#fff}
.btn-reset-partial{background:#fff;color:#E8611A;border:2px solid #E8611A}
.btn-reset-full{background:#fff;color:#c0392b;border:2px solid #c0392b}
.btn-edit{background:#fff;color:#2A5FA8;border:2px solid #2A5FA8}
.loading-overlay{display:none;position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:794px;height:100%;background:rgba(255,255,255,0.92);z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.loading-overlay.show{display:flex}
.spinner{width:44px;height:44px;border:4px solid #eee;border-top-color:#E8611A;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:998;align-items:center;justify-content:center}
.confirm-overlay.show{display:flex}
.confirm-box{background:#fff;border-radius:12px;padding:24px;max-width:320px;width:90%;text-align:center}
.confirm-box p{font-size:14px;color:#555;margin-bottom:18px;line-height:1.6}
.confirm-btns{display:flex;gap:10px;justify-content:center}
.step-indicator{display:flex;align-items:center;overflow-x:auto;padding:8px 16px;background:#fff;border-bottom:1px solid #eee;scrollbar-width:none}
.step-indicator::-webkit-scrollbar{display:none}
.step-dot{width:26px;height:26px;border-radius:50%;border:2px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:11px;color:#aaa;flex-shrink:0;cursor:pointer;transition:.15s}
.step-dot.done{background:#E8611A;border-color:#E8611A;color:#fff}
.step-dot.active{border-color:#E8611A;color:#E8611A;font-weight:700}
.step-line{flex:1;height:2px;background:#eee;min-width:6px}
.step-line.done{background:#E8611A}
#pdf-template{display:none;position:fixed;top:-9999px;left:0;width:900px;background:#fff;font-family:Arial,sans-serif;direction:rtl}
@media(max-width:500px){
  body{font-size:13px}
  .card-group{grid-template-columns:1fr}
  .btn{padding:9px 12px;font-size:13px}

.date-orange::-webkit-datetime-edit{display:none}
.date-orange::-webkit-calendar-picker-indicator{width:32px;height:32px;cursor:pointer;opacity:1;filter:invert(40%) sepia(90%) saturate(500%) hue-rotate(0deg);background-size:contain}

function t(k){return (T[lang]||T.he)[k]||k}

// ============================================================
// STEP FLOW
// ============================================================
function getSteps(){
  const mt=S.machineType;
  const steps=[1,3,4];
  if(mt && mt!=='mill3' && mt!=='other' && mt!=='mtm') steps.push(5);
  if(mt==='mtm') steps.push(6);
  if(mt!=='swiss'&&mt!=='mill3'&&mt!=='mill4'&&mt!=='mill5'&&mt!=='other') steps.push(7);
  if(mt!=='other') steps.push(8);
  steps.push(9,'s');
  return steps;
}
function stepId(){return getSteps()[currentStep-1];}
function totalCount(){return getSteps().length;}

// ============================================================
// RENDER ENGINE
// ============================================================
function setLang(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.textContent.trim()===({he:'עברית',en:'English'}[l])));
  document.documentElement.lang=l;
  document.documentElement.dir=l==='he'?'rtl':'ltr';
  paint();
}

function paint(){
  document.getElementById('hdr-title').textContent=t('appTitle');
  document.getElementById('hdr-sub').textContent=t('appSub');
  paintIndicator();
  const body=document.getElementById('app-body');
  const sid=stepId();
  if(sid==='s'){paintSummary(body);paintNav(true);return;}
  const builders={1:step1,3:step3,4:step4,5:step5,6:step6,7:step7,8:step8,9:step9};
  const introHtml=sid===1?`<div class="intro-box">${t('intro')}</div>`:'';
  body.innerHTML=`<div class="step-content">${introHtml}${builders[sid]()}</div>`;
  paintNav(false);
  attachTextListeners();
}

function paintIndicator(){
  const steps=getSteps();
  const names={1:t('s1'),3:t('s3'),4:t('s4'),5:t('s5'),6:t('s6'),7:t('s7'),8:t('s8'),9:t('s9'),s:t('ss')};
  let h='';
  steps.forEach((s,i)=>{
    const done=i<currentStep-1, active=i===currentStep-1;
    h+=`<div class="step-dot${done?' done':''}${active?' active':''}" onclick="jumpTo(${i+1})" title="${names[s]}">${done?'✓':i+1}</div>`;
    if(i<steps.length-1) h+=`<div class="step-line${done?' done':''}"></div>`;
  });
  document.getElementById('step-indicator').innerHTML=h;
}

function paintNav(isSummary){
  document.getElementById('bottom-bar').style.display=isSummary?'none':'flex';
  if(isSummary) return;
  const isLast=currentStep===totalCount()-1;
  document.getElementById('btn-next').textContent=isLast?t('finish'):t('next');
  document.getElementById('btn-prev').textContent=t('prev');
  document.getElementById('btn-prev').style.visibility=currentStep>1?'visible':'hidden';
  const total=totalCount()-1;
  const pager=document.getElementById('pager');
  pager.textContent=`${Math.min(currentStep,total)} / ${total}`;
  pager.style.direction='ltr';
}

function jumpTo(n){if(n<currentStep){currentStep=n;paint();}}

    h+=fieldRadio('turretTypeLbl','turretType',[['turret',t('ttTurret')],['head',t('ttHead')]],S.turretType,true);
    if(S.turretType==='turret'){
      h+=fieldRadio('yAxisLbl','yAxis',[['yes',t('yAxisYes')],['no',t('yAxisNo')]],S.yAxis,true);
      h+=`<div class="field-group"><div class="field-label">${t('toolCountLbl')} <span class="required">*</span></div>
        <input class="field-input" type="number" min="1" id="f-toolCount" value="${S.toolCount}" style="max-width:120px">
        <div class="error-msg" id="err-toolCount"></div></div>`;

  } else if(mt==='mtm'){

    // התקנים

      <div class="field-label" style="font-weight:700;margin-bottom:8px">${t('swissDevicesLbl')}</div>
      ${S.swissDevices.map((d,di)=>`
        <div class="section-card" style="margin-bottom:8px">
          <div class="section-card-title">${t('fixTitle')} ${di+1}
            <button class="btn-remove" onclick="removeSwissDevice(${di})">${t('removeFixture')}</button>
          </div>
          <div class="field-label" style="margin-bottom:4px">${t('fixtureTypeLbl')} <span class="required">*</span></div>

          <div class="field-label" style="margin-bottom:4px">${t('fixtureStationsLbl')} <span class="required">*</span></div>

      <button class="btn-add" style="font-size:13px;padding:8px 16px;margin-top:4px" onclick="addSwissDevice()">+ ${t('addFixture')}</button>
    </div>`;
    // דרישות מיוחדות
    h+=`<div class="field-group">
      <div class="notice-box">${t('swissStdNote')}</div>
      <div class="field-label" style="margin-top:8px">${t('swissSpecialLbl')} <span class="required">*</span></div>

function buildGroup(g,gi,mt){
  const updInp=(k)=>`updateGVal(${gi},false,'${k}',this.value)`;
  const isMTM=mt==='mtm';
  let h=`<div class="section-card">
    <div class="section-card-title">${t('groupTitle')} ${gi+1}
      ${gi>0?`<button class="btn-remove" onclick="removeGroup(${gi},false)">${t('removeGroup')}</button>`:''}
    </div>`;

  // a. עליון / תחתון
  h+=`<div class="field-group"><div class="field-label">${t('turretPosLbl')} <span class="required">*</span></div><div class="radio-group">
    ${radio3(`g${gi}pos`,'upper',t('posUp'),g.pos==='upper',`updateG(${gi},false,'pos','upper')`)}
    ${radio3(`g${gi}pos`,'lower',t('posDown'),g.pos==='lower',`updateG(${gi},false,'pos','lower')`)}
  </div></div>`;

  // b. ספינדל (MTM עם יותר מ-1)
  if(isMTM && parseInt(S.spindleCount)>1){
    h+=`<div class="field-group"><div class="field-label">${t('spCapLbl')} <span class="required">*</span></div><div class="radio-group" style="flex-wrap:wrap">
      ${radio3(`g${gi}sp`,'main',t('spMain'),g.spCap==='main',`updateG(${gi},false,'spCap','main')`)}
      ${radio3(`g${gi}sp`,'sub',t('spSub'),g.spCap==='sub',`updateG(${gi},false,'spCap','sub')`)}
      ${radio3(`g${gi}sp`,'both',t('spBoth'),g.spCap==='both',`updateG(${gi},false,'spCap','both')`)}
    </div></div>`;
  }

  // c. צריח או ראש
  h+=`<div class="field-group"><div class="field-label">${t('turretTypeLbl')} <span class="required">*</span></div><div class="radio-group">
    ${radio3(`g${gi}tt`,'turret',t('ttTurret'),g.turretType==='turret',`updateG(${gi},false,'turretType','turret')`)}
    ${radio3(`g${gi}tt`,'head',t('ttHead'),g.turretType==='head',`updateG(${gi},false,'turretType','head')`)}
  </div></div>`;

  // c.i – אם צריח: Y axis + כמה כלים
  if(g.turretType==='turret'){
    h+=`<div class="field-group"><div class="field-label">${t('yAxisLbl')} <span class="required">*</span></div><div class="radio-group">
      ${radio3(`g${gi}yax`,'yes',t('yAxisYes'),g.yAxis==='yes',`updateG(${gi},false,'yAxis','yes')`)}
      ${radio3(`g${gi}yax`,'no',t('yAxisNo'),g.yAxis==='no',`updateG(${gi},false,'yAxis','no')`)}
    </div></div>`;
    h+=`<div class="field-group"><div class="field-label">${t('toolCountLbl')} <span class="required">*</span></div>
      <input class="field-input" type="number" min="1" value="${g.toolCount||''}" oninput="${updInp('toolCount')}" style="max-width:120px">
    </div>`;
    // MTM: is milling?
    if(isMTM){
      h+=`<div class="field-group"><div class="field-label">${t('isMillingLbl')} <span class="required">*</span></div><div class="radio-group">
        ${radio3(`g${gi}mill`,'yes',t('yes'),g.isMilling==='yes',`updateG(${gi},false,'isMilling','yes')`)}
        ${radio3(`g${gi}mill`,'no',t('no'),g.isMilling==='no',`updateG(${gi},false,'isMilling','no')`)}
      </div></div>`;
    }
  }

  h+='</div>';
  return h;
}

function paintSummary(body){
  const mt=S.machineType;
  const mtMap={lathe:t('tLath'),latheMill:t('tLathMill'),mtm:t('tMTM'),swiss:t('tSwiss'),mill3:t('tMill3'),mill4:t('tMill4'),mill5:t('tMill5'),other:t('tOther')};
  const r=(l,v)=>v||v===0?`<div class="summary-row"><span class="summary-label">${l}</span><span class="summary-val">${v}</span></div>`:'';
  const imgs=(arr)=>arr&&arr.length?`<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">${arr.map(i=>`<img src="${i.data}" style="width:60px;height:60px;object-fit:cover;border-radius:6px;border:1px solid #ddd">`).join('')}</div>`:'';
  let secs=[];
  secs.push({t:t('s1'),b:r(t('company'),S.company)+r(t('contactName'),S.contactName)+r(t('phone'),S.phone)+r(t('email'),S.email||'—')});
  secs.push({t:t('s2'),b:r(t('softwareLbl'),S.software==='cimatron'?t('swCimatron'):t('swGibbs'))});
  let b3=r(t('machineName'),S.machineName)+imgs(S.machineNameImg)+r(t('controllerName'),S.controllerName)+imgs(S.controllerImg)+r(t('onSiteLbl'),S.onSite==='yes'?t('yes'):t('no'));
  if(S.onSite==='no') b3+=r(t('expectedDateLbl'),formatDate(S.expectedDate));
  secs.push({t:t('s3'),b:b3});
  secs.push({t:t('s4'),b:r(t('machineTypeLbl'),mtMap[mt]||'')});
  let b5='';
  if(mt==='lathe'||mt==='latheMill'){b5+=r(t('turretPosLbl'),S.turretPos)+r(t('turretTypeLbl'),S.turretType)+r(t('yAxisLbl'),S.yAxis)+r(t('toolCountLbl'),S.toolCount);}
  else if(mt==='mtm'){b5+=r(t('spindleCountLbl'),S.spindleCount);if(parseInt(S.spindleCount)>1)b5+=r(t('mtmSpecialLbl'),S.mtmSpecial==='yes'?t('yes')+': '+S.mtmSpecialDesc:t('no'));}
  else if(mt==='swiss'){b5+=r(t('swissSpecialLbl'),S.swissSpecial==='yes'?t('yes')+': '+S.swissSpecialDesc:t('no'))+imgs(S.swissImg);}
  else if(mt==='mill4'){b5+=r(t('mill4AxisLbl'),S.mill4Axis);}
  else if(mt==='mill5'){b5+=r(t('mill5Ax1'),`${S.ax1Type} – ${S.ax1Mount}`)+r(t('mill5Ax2'),`${S.ax2Type} – ${S.ax2Mount}`);}
  if(b5) secs.push({t:t('s5'),b:b5});
  const groups=mt==='swiss'?S.swissGroups:S.toolGroups;
  if(groups.length&&getSteps().includes(6)){
    let b6='';
    groups.forEach((g,gi)=>{
      b6+=`<div style="font-weight:700;color:#E8611A;margin:8px 0 4px">${t('groupTitle')} ${gi+1}</div>`;
      b6+=r(t('turretPosLbl'),g.pos)+r(t('turretTypeLbl'),g.turretType)+r(t('yAxisLbl'),g.yAxis)+r(t('toolCountLbl'),g.toolCount);
      if(g.spCap) b6+=r(t('spCapLbl'),{main:t('spMain'),sub:t('spSub'),both:t('spBoth')}[g.spCap]);
      b6+=r(t('staticLbl'),g.staticCount);if(parseInt(g.staticCount)>0)b6+=r(t('staticNumsLbl'),g.staticNums);
      b6+=r(t('rotLbl'),g.rotCount);if(parseInt(g.rotCount)>0)b6+=r(t('rotNumsLbl'),g.rotNums);
      if(g.extraDescYN==='yes')b6+=r(t('groupExtraLbl'),g.extraDesc)+imgs(g.extraImages);
    });
    secs.push({t:t('s6'),b:b6});
  }
  if(getSteps().includes(7)){
    let b7='';
    if(S.asmNone) b7+=r(t('asmLbl'),t('asmNone'));
    else{
      [['Stinger','asmStinger'],['Lunette','asmLunette'],['Fork','asmFork'],['Bar','asmBar'],['Other','asmOther']].forEach(([sfx,lk])=>{
        if(S['asm'+sfx]) b7+=r(t(lk),S['asm'+sfx+'Desc']||'✓')+imgs(S['asm'+sfx+'Img']);
      });
    }
    if(b7) secs.push({t:t('s7'),b:b7});
  }
  if(getSteps().includes(8)) secs.push({t:t('s8'),b:r(t('simLbl'),S.simulation==='yes'?t('yes'):t('no'))+(S.simulation==='yes'?`<div class="notice-box" style="font-size:12px;margin-top:4px">${t('simNote')}</div>`:'')});
  let b9=r(t('extraLbl'),S.extraInfo==='yes'?t('yes'):t('no'));
  if(S.extraInfo==='yes') b9+=r(t('extraDesc'),S.extraInfoDesc)+imgs(S.extraInfoImg);
  secs.push({t:t('s9'),b:b9});

  let h=`<div class="summary-wrap">
    <p class="step-title">${t('sumTitle')}</p>
    ${secs.map(s=>`<div class="summary-section"><div class="summary-section-title">${s.t}</div>${s.b}</div>`).join('')}
    <div class="email-note">✉ ${t('sumEmail')}</div>
    <div class="action-bar">
      <button class="btn-action btn-pdf" onclick="doPDF()">📄 ${t('btnPdf')}</button>
      <button class="btn-action btn-share" onclick="doSharePDF()">↗ ${t('btnShare')}</button>
      <button class="btn-action btn-edit" onclick="prevStep()">‹ ${t('prev')}</button>
      <button class="btn-action btn-reset-full" onclick="doResetFull()">🗑 ${t('btnResetFull')}</button>
      <button class="btn-action btn-reset-partial" onclick="doResetPartial()">↺ ${t('btnResetPartial')}</button>
    </div>
  </div>`;
  body.innerHTML=h;
}

function toggleAsm(sfx,checked){
  if(sfx==='None'){S.asmNone=checked;if(checked){['Stinger','Lunette','Fork','Bar','Other'].forEach(k=>S['asm'+k]=false);}}
  else{S['asm'+sfx]=checked;if(checked)S.asmNone=false;}
  paint();
}
function addAsmImg(sfx,files){readImgs(files,imgs=>{S['asm'+sfx+'Img']=(S['asm'+sfx+'Img']||[]).concat(imgs);paint();});}
function handleImg(key,files){readImgs(files,imgs=>{S[key]=(S[key]||[]).concat(imgs);paint();});}
function readImgs(files,cb){
  if(!files||!files.length){cb([]);return;}
  const out=[],total=files.length;let done=0;
  Array.from(files).forEach(f=>{
    const fr=new FileReader();
    fr.onloadend=()=>{out.push({name:f.name,data:fr.result});if(++done===total)cb(out);};
    fr.readAsDataURL(f);
  });
}

function attachTextListeners(){
  const map={
    'f-company':'company','f-contactName':'contactName','f-phone':'phone','f-email':'email',
    'f-machineName':'machineName','f-controllerName':'controllerName',
    'f-expectedDate':'expectedDate','f-toolCount':'toolCount',
    'f-mtmSpecialDesc':'mtmSpecialDesc','f-swissSpecialDesc':'swissSpecialDesc',
    'f-extraInfoDesc':'extraInfoDesc','f-machineTypeOther':'machineTypeOther'
  };
  Object.entries(map).forEach(([id,key])=>{
    const el=document.getElementById(id);
    if(el) el.addEventListener('input',()=>{S[key]=el.value;});
  });
}

// ============================================================
// VALIDATION
// ============================================================
function validate(){
  let ok=true;
  const sid=stepId();
  const E=(id,msg)=>{const e=document.getElementById(id);if(e){e.textContent=msg;e.style.display='block';}ok=false;};
  const H=(id)=>{const e=document.getElementById(id);if(e)e.style.display='none';};
  // Save typed values first
  attachTextListeners();
  ['company','contactName','phone','email','machineName','controllerName','expectedDate','toolCount','mtmSpecialDesc','swissSpecialDesc','extraInfoDesc','machineTypeOther'].forEach(k=>{
    const el=document.getElementById('f-'+k);if(el)S[k]=el.value;
  });
  if(sid===1){
    ['company','contactName','phone'].forEach(k=>{S[k].trim()?H('err-'+k):E('err-'+k,t('eReq'));});
  }
  if(sid===2){S.software?H('err-software'):E('err-software',t('eSel'));}// לא בשימוש
  if(sid===3){
    S.software?H('err-software'):E('err-software',t('eSel'));
    ['machineName','controllerName'].forEach(k=>{S[k].trim()?H('err-'+k):E('err-'+k,t('eReq'));});
    S.onSite?H('err-onSite'):E('err-onSite',t('eSel'));
    if(S.onSite==='no'){S.expectedDate?H('err-expectedDate'):E('err-expectedDate',t('eReq'));}
  }
  if(sid===4){
    S.machineType?H('err-machineType'):E('err-machineType',t('eSel'));
    if(S.machineType==='other'){(S.machineTypeOther||'').trim()?H('err-machineTypeOther'):E('err-machineTypeOther',t('eReq'));}
  }
  if(sid===5){
    const mt=S.machineType;
    if(mt==='lathe'){
      S.turretPos?H('err-turretPos'):E('err-turretPos',t('eSel'));
      S.turretType?H('err-turretType'):E('err-turretType',t('eSel'));
      if(S.turretType==='turret'){S.toolCount?H('err-toolCount'):E('err-toolCount',t('eReq'));}
    } else if(mt==='latheMill'){
      S.turretPos?H('err-turretPos'):E('err-turretPos',t('eSel'));
      S.turretType?H('err-turretType'):E('err-turretType',t('eSel'));
      if(S.turretType==='turret'){
        S.yAxis?H('err-yAxis'):E('err-yAxis',t('eSel'));
        S.toolCount?H('err-toolCount'):E('err-toolCount',t('eReq'));
      }
    } else if(mt==='mtm'){
      // spindleCount validation moved to step6
    } else if(mt==='swiss'){S.swissSpecial?H('err-swissSpecial'):E('err-swissSpecial',t('eSel'));}
    else if(mt==='mill4'){S.mill4Axis?H('err-mill4Axis'):E('err-mill4Axis',t('eSel'));}
    else if(mt==='mill5'){
      S.ax1Type?H('err-ax1Type'):E('err-ax1Type',t('eSel'));
      S.ax2Type?H('err-ax2Type'):E('err-ax2Type',t('eSel'));
    }
  }
  if(sid===6){
    S.spindleCount?H('err-spindleCount'):E('err-spindleCount',t('eSel'));
    if(parseInt(S.spindleCount)>1){S.mtmSpecial?H('err-mtmSpecial'):E('err-mtmSpecial',t('eSel'));}
    S.toolGroups.length?H('err-toolGroups'):E('err-toolGroups',t('eGroup'));
  }
  if(sid===7){
    const any=S.asmNone||['Stinger','Lunette','Fork','Bar','Other'].some(k=>S['asm'+k]);
    any?H('err-asm'):E('err-asm',t('eAsm'));
  }
  if(sid===8){S.simulation?H('err-simulation'):E('err-simulation',t('eSel'));}
  if(sid===9){S.extraInfo?H('err-extraInfo'):E('err-extraInfo',t('eSel'));}
  return ok;
}

function buildPdfHtml(forceLang){
  const useLang=forceLang||lang;
  const tl=(k)=>(T[useLang]||T.he)[k]||k;
  const mt=S.machineType;
  const dir=useLang==='he'?'rtl':'ltr';
  const or='#E8611A';
  const logo=logoBase64?`<img src="${logoBase64}" style="height:36px">`:'';
  const base=`font-family:Arial,sans-serif;direction:${dir};width:900px;background:#fff;`;
  const secStyle=`${base}padding:10px 32px;`;
  const hdr=`<div class="pdf-section" style="${base}background:${or};padding:16px 28px;display:flex;align-items:center;justify-content:space-between">
    <div><div style="color:#fff;font-size:26px;font-weight:700">${tl('appTitle')}</div><div style="color:#ffe0cc;font-size:16px">${tl('appSub')}</div></div>${logo}
  </div>`;
  const secTitle=(txt)=>`<div style="background:${or};color:#fff;display:inline-block;padding:8px 20px;border-radius:5px;font-size:22px;font-weight:700;margin-bottom:10px">${txt}</div>`;
  const row=(l,v)=>(!v&&v!==0)?'':`<div style="display:flex;gap:12px;margin-bottom:10px;font-size:22px;line-height:1.5"><span style="color:#888;min-width:220px;flex-shrink:0;font-size:20px">${l}</span><span style="color:#222;flex:1">${v}</span></div>`;
  const note=(txt)=>txt?`<div style="background:#fff3e0;border:1px solid #ffe0b2;border-radius:6px;padding:10px 14px;font-size:18px;color:#555;margin:8px 0;white-space:pre-line;line-height:1.6">${txt}</div>`:'';
  const subsec=(txt)=>`<div style="font-weight:700;color:${or};font-size:20px;margin:10px 0 6px">${txt}</div>`;
  const imgBlock=(imgs)=>{
    if(!imgs||!imgs.length) return '';
    // כל תמונה ב-section נפרד כדי למנוע חיתוך בין דפים
    return imgs.map(i=>`<div class="pdf-section" style="${secStyle}text-align:center"><img src="${i.data}" style="width:80%;display:block;margin:0 auto;border-radius:6px;object-fit:contain"></div>`).join('');
  };
  const section=(title,content)=>{
    if(!content) return '';
    return `<div class="pdf-section" style="${secStyle}">${title?secTitle(title):''}${content}</div>`;
  };
  const mtMap={lathe:tl('tLath'),latheMill:tl('tLathMill'),mtm:tl('tMTM'),swiss:tl('tSwiss'),mill3:tl('tMill3'),mill4:tl('tMill4'),mill5:tl('tMill5'),other:tl('tOther')};
  let parts=hdr;

  // ── סעיף 1: פרטי לקוח ──
  parts+=section(tl('s1'),
    row(tl('company'),S.company)+
    row(tl('contactName'),S.contactName)+
    row(tl('phone'),S.phone)+
    row(tl('email'),S.email||'—')
  );

  // ── סעיף 2: תוכנה ──
  parts+=section(tl('s2'),
    row(tl('softwareLbl'),S.software==='cimatron'?tl('swCimatron'):tl('swGibbs'))
  );

  // ── סעיף 3: פרטי מכונה ──
  parts+=section(tl('s3'), row(tl('machineName'),S.machineName));
  parts+=imgBlock(S.machineNameImg);
  parts+=section('', row(tl('controllerName'),S.controllerName));
  parts+=imgBlock(S.controllerImg);
  let s3c=row(tl('onSiteLbl'),S.onSite==='yes'?tl('yes'):tl('no'));
  if(S.onSite==='no'){
    s3c+=`<div style="font-size:22px;color:#222;margin-bottom:4px">${tl('expectedDateLbl')}</div>`;
    s3c+=note(tl('expectedDateNote'));
    s3c+=`<div style="font-size:22px;font-weight:700;color:#E8611A;margin-top:6px">${formatDate(S.expectedDate)}</div>`;
  }
  parts+=section('',s3c);

  // ── סעיף 4: סוג מכונה ──
  let s4=row(tl('machineTypeLbl'),mtMap[mt]||'');
  if(mt==='other') s4+=row(tl('otherDescLbl'),S.machineTypeOther);
  parts+=section(tl('s4'),s4);

  // ── סעיף 5: הגדרת מכונה ──
  if(mt==='lathe'){
    parts+=section(tl('s5'),
      row(tl('turretPosLbl'),S.turretPos)+
      row(tl('turretTypeLbl'),S.turretType)+
      row(tl('toolCountLbl'),S.toolCount)
    );
  } else if(mt==='latheMill'){
    parts+=section(tl('s5'),
      row(tl('turretPosLbl'),S.turretPos)+
      row(tl('turretTypeLbl'),S.turretType)+
      row(tl('yAxisLbl'),S.yAxis)+
      row(tl('toolCountLbl'),S.toolCount)
    );
  } else if(mt==='mtm'){
    let s5=row(tl('spindleCountLbl'),S.spindleCount);
    if(parseInt(S.spindleCount)>1){
      s5+=note(tl('mtmStdNote'));
      s5+=row(tl('mtmSpecialLbl'),S.mtmSpecial==='yes'?tl('yes'):tl('no'));
      if(S.mtmSpecial==='yes'&&S.mtmSpecialDesc) s5+=row('',S.mtmSpecialDesc);
    }
    parts+=section(tl('s5'),s5);
  } else if(mt==='swiss'){
    let s5=note(tl('swissStdNote'));
    s5+=row(tl('swissSpecialLbl'),S.swissSpecial==='yes'?tl('yes'):tl('no'));
    if(S.swissSpecial==='yes'&&S.swissSpecialDesc) s5+=row('',S.swissSpecialDesc);
    parts+=section(tl('s5'),s5);
    parts+=imgBlock(S.swissImg);
    S.swissDevices.forEach((d,di)=>{
      let ds=row(tl('fixtureTypeLbl'),d.type)+row(tl('fixtureStationsLbl'),d.stations);
      if(d.desc) ds+=row(tl('addDesc'),d.desc);
      parts+=section(`${tl('fixTitle')} ${di+1}`,ds);
      parts+=imgBlock(d.images);
    });
  } else if(mt==='mill4'){
    parts+=section(tl('s5'),row(tl('mill4AxisLbl'),S.mill4Axis));
  } else if(mt==='mill5'){
    parts+=section(tl('s5'),
      row(tl('mill5Ax1'),S.ax1Type+' – '+(S.ax1Mount==='table'?tl('mountTable'):tl('mountHead')))+
      row(tl('mill5Ax2'),S.ax2Type+' – '+(S.ax2Mount==='table'?tl('mountTable'):tl('mountHead')))
    );
  }

  // ── סעיף 6: קבוצות כלים (MTM) ──
  if(getSteps().includes(6)){
    S.toolGroups.forEach((g,gi)=>{
      let gc='';
      gc+=row(tl('turretPosLbl'),g.pos);
      // ספינדל (אם יותר מ-1)
      if(parseInt(S.spindleCount)>1&&g.spCap)
        gc+=row(tl('spCapLbl'),{main:tl('spMain'),sub:tl('spSub'),both:tl('spBoth')}[g.spCap]);
      gc+=row(tl('turretTypeLbl'),g.turretType);
      if(g.turretType==='turret'){
        gc+=row(tl('yAxisLbl'),g.yAxis);
        gc+=row(tl('toolCountLbl'),g.toolCount);
        gc+=row(tl('isMillingLbl'),g.isMilling==='yes'?tl('yes'):tl('no'));
      }
      parts+=section(`${tl('s6')} – ${tl('groupTitle')} ${gi+1}`,gc);
    });
  }

  // ── סעיף 7: מכלולים ──
  if(getSteps().includes(7)){
    const anyAsm=S.asmNone||['Stinger','Lunette','Fork','Bar','Other'].some(k=>S['asm'+k]);
    if(anyAsm){
      if(S.asmNone){
        parts+=section(tl('s7'),row(tl('asmLbl'),tl('asmNoneLabel')));
      } else {
        let firstAsm=true;
        [['Stinger','asmStinger'],['Lunette','asmLunette'],['Fork','asmFork'],['Bar','asmBar'],['Other','asmOther']].forEach(([sfx,lk])=>{
          if(S['asm'+sfx]){
            let ac=subsec(tl(lk));
            if(S['asm'+sfx+'Desc']) ac+=row(tl('asmDesc'),S['asm'+sfx+'Desc']);
            parts+=section(firstAsm?tl('s7'):'',ac);
            parts+=imgBlock(S['asm'+sfx+'Img']||[]);
            firstAsm=false;
          }
        });
      }
    }
  }

  // ── סעיף 8: סימולציה ──
  if(getSteps().includes(8)){
    let s8=row(tl('simLbl'),S.simulation==='yes'?tl('yes'):tl('no'));
    if(S.simulation==='yes') s8+=note(tl('simNote'));
    parts+=section(tl('s8'),s8);
  }

  // ── סעיף 9: מידע נוסף ──
  let s9=row(tl('extraLbl'),S.extraInfo==='yes'?tl('yes'):tl('no'));
  if(S.extraInfo==='yes'&&S.extraInfoDesc) s9+=row(tl('extraDesc'),S.extraInfoDesc);
  parts+=section(tl('s9'),s9);
  if(S.extraInfo==='yes') parts+=imgBlock(S.extraInfoImg||[]);

  // ── Footer ──
  parts+=`<div class="pdf-section" style="${secStyle}border-top:2px solid #eee;margin-top:4px">
    <div style="background:#e8f4f8;border:1px solid #b3d9e8;border-radius:6px;padding:12px;font-size:20px;color:#1a5f7a;text-align:center;margin-bottom:10px">✉ ${tl('sumEmail')}</div>
    <div style="font-size:16px;color:#bbb;display:flex;justify-content:space-between"><span>${tl('pdfFor')}</span><span>${tl('dateLabel')}: ${new Date().toLocaleDateString()}</span></div>
  </div>`;

  return `<div style="${base}">${parts}</div>`;
}

function formatDate(d){
  if(!d) return '';
  const parts=d.split('-');
  if(parts.length===3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
  return d;
}

async function doSharePDF(){
  // שלב 1: הורד את ה-PDF
  await doPDF(false);
  // שלב 2: פתח mailto עם הכתובת והנחיה לצרף
  const subject=encodeURIComponent(t('appTitle')+' – '+S.company);
  const body=encodeURIComponent(t('emailBody'));
  window.location.href=`mailto:shay.aziz@cimatron.com?subject=${subject}&body=${body}`;
}

async function doPDF(share=false){
  const ov=document.getElementById('loading-overlay');
  document.getElementById('loading-text').textContent=t('loading');
  ov.classList.add('show');
  const tmpl=document.getElementById('pdf-template');
  // אם שפה רוסית — PDF דו-לשוני: רוסית + עברית
  tmpl.innerHTML=buildPdfHtml();
  tmpl.style.display='block';
  await new Promise(r=>setTimeout(r,600));
  try{
    const {jsPDF}=window.jspdf;
    const W=210,H=297;
    const SCALE=1.5;
    const PPM=900/W,PH=H*PPM;
    const sections=tmpl.querySelectorAll('.pdf-section');
    const pdf=new jsPDF({orientation:'p',unit:'mm',format:'a4'});
    let curY=0;
    let firstPage=true;
    for(const sec of sections){
      const cv=await html2canvas(sec,{scale:SCALE,useCORS:true,backgroundColor:'#fff',logging:false,width:900});
      const secH=(cv.height/SCALE/PPM);
      const secW=W;
      if(!firstPage && curY+secH>H-10){pdf.addPage();curY=0;}
      firstPage=false;
      pdf.addImage(cv.toDataURL('image/jpeg',0.6),'JPEG',0,curY,secW,secH);
      curY+=secH+2;
    }
    const blob=pdf.output('blob');
    const name=`איפיון-פוסט-${(S.company||'cimatron').replace(/\s+/g,'-')}.pdf`;
    if(share && navigator.share){
      const file=new File([blob],name,{type:'application/pdf'});
      if(navigator.canShare&&navigator.canShare({files:[file]})){
        try{await navigator.share({title:t('appTitle'),files:[file]});return;}
        catch(e){if(e.name==='AbortError')return;}
      }
    }
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),3000);
  }catch(e){console.error(e);alert('שגיאה ביצירת PDF: '+e.message);}
  finally{tmpl.style.display='none';ov.classList.remove('show');}
}
