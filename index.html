<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>איפיון פוסט סימטרון וגיבסקאם</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f5f0;color:#222;min-height:100vh;font-size:15px}
.page-wrapper{max-width:794px;margin:0 auto;background:#f5f5f0}
.lang-bar{background:#fff;border-bottom:1px solid #ddd;padding:8px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.lang-btn{background:none;border:1px solid #ccc;border-radius:20px;padding:4px 14px;cursor:pointer;font-size:13px;color:#555}
.lang-btn.active{background:#E8611A;color:#fff;border-color:#E8611A}
header{background:#fff;border-bottom:1px solid #ddd;padding:10px 16px;display:flex;flex-direction:column;align-items:center;gap:3px}
.header-title{font-size:15px;font-weight:700;color:#E8611A;text-align:center}
.header-sub{font-size:12px;color:#888;text-align:center}
.intro-box{background:#fff8f5;border:1px solid #f5c0a0;border-radius:10px;padding:14px 16px;margin:12px 16px;font-size:14px;line-height:1.7;color:#333}
.step-content{padding:0 16px 140px}
.step-title{font-size:19px;font-weight:700;margin:18px 0 14px;color:#222}
.field-group{margin-bottom:14px}
.field-label{font-size:14px;color:#444;margin-bottom:5px;display:flex;align-items:flex-start;gap:4px;flex-wrap:wrap;line-height:1.5}
.required{color:#E8611A;flex-shrink:0}
.field-input{width:100%;border:1px solid #ccc;border-radius:8px;padding:10px 12px;font-size:15px;font-family:Arial;outline:none;color:#222;background:#fff}
.field-input:focus{border-color:#E8611A}
.radio-group{display:flex;gap:10px;margin-top:4px;flex-wrap:wrap}
.radio-option{display:flex;align-items:center;gap:6px;background:#fff;border:1px solid #ccc;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:14px}
.radio-option.selected{border-color:#E8611A;background:#fff8f5}
.radio-option input{accent-color:#E8611A}
.checkbox-item{background:#fff;border:1px solid #ddd;border-radius:8px;padding:11px 14px;margin-bottom:7px;display:flex;align-items:center;justify-content:flex-end;gap:10px;cursor:pointer;font-size:14px;flex-direction:row-reverse}
.checkbox-item input[type=checkbox]{accent-color:#E8611A;width:18px;height:18px;cursor:pointer;flex-shrink:0}
.checkbox-item:has(input:checked){border-color:#E8611A;background:#fff8f5}
.notice-box{background:#fff3e0;border:1px solid #ffe0b2;border-radius:8px;padding:11px 14px;font-size:13px;color:#555;margin:8px 0;line-height:1.6}
.notice-box ul{margin-top:6px;padding-right:18px}
.notice-box ul li{margin-bottom:3px}
.notice-box strong{display:block;margin-bottom:4px;color:#E8611A}
.error-msg{color:#c0392b;font-size:12px;margin-top:5px;display:none}
.hidden{display:none!important}
.show{display:block!important}
.card-group{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
.type-card{background:#fff;border:1.5px solid #ddd;border-radius:10px;padding:12px 14px;cursor:pointer;text-align:center;font-size:14px;font-weight:700;transition:all .15s}
.type-card:hover{border-color:#E8611A}
.type-card.selected{border-color:#E8611A;background:#fff8f5;color:#E8611A}
.section-card{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:14px 16px;margin-bottom:12px;position:relative}
.section-card-title{font-size:14px;font-weight:700;color:#E8611A;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.btn-remove-group{background:#fff;border:1px solid #e74c3c;color:#e74c3c;border-radius:6px;padding:3px 10px;font-size:12px;cursor:pointer}
.btn-remove-group:hover{background:#fdf0f0}
.btn-add-group{background:#E8611A;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:14px;cursor:pointer;font-weight:700;margin-top:8px;display:flex;align-items:center;gap:6px}
.btn-add-group:hover{background:#d4551a}
.btn-add-group-wrap{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap}
.file-label{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px dashed #ccc;border-radius:8px;padding:8px 14px;font-size:13px;color:#666;cursor:pointer;margin-top:6px}
.file-label:hover{border-color:#E8611A;color:#E8611A}
.file-label input{display:none}
.file-preview{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.file-preview img{width:60px;height:60px;object-fit:cover;border-radius:6px;border:1px solid #ddd}
.file-preview .fp-name{font-size:11px;color:#888;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:794px;background:#fff;border-top:1px solid #ddd;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;box-shadow:0 -2px 8px rgba(0,0,0,0.07)}
.pager{font-size:13px;color:#888;white-space:nowrap;text-align:center}
.btn{border:none;border-radius:8px;padding:11px 20px;font-size:14px;cursor:pointer;font-weight:700;white-space:nowrap}
.btn-next{background:#E8611A;color:#fff}
.btn-next:hover{background:#d4551a}
.btn-prev{background:#fff;color:#E8611A;border:2px solid #E8611A}
.btn-prev:hover{background:#fff8f5}
.textarea-field{width:100%;border:1px solid #ccc;border-radius:8px;padding:10px 12px;font-size:14px;font-family:Arial;min-height:80px;outline:none;resize:vertical;direction:inherit;background:#fff}
.textarea-field:focus{border-color:#E8611A}
/* Summary */
.summary-wrap{padding:0 16px 140px}
.summary-section{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:14px 16px;margin-bottom:10px}
.summary-section-title{font-size:14px;font-weight:700;color:#E8611A;margin-bottom:8px;border-bottom:1px solid #f0e0d8;padding-bottom:6px}
.summary-row{display:flex;gap:8px;font-size:13px;margin-bottom:6px;line-height:1.5}
.summary-label{color:#999;min-width:140px;flex-shrink:0;font-size:12px}
.summary-val{color:#222;flex:1}
.summary-img-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.summary-img-row img{width:70px;height:70px;object-fit:cover;border-radius:6px;border:1px solid #ddd}
.action-bar{display:flex;flex-wrap:wrap;gap:10px;margin-top:24px;justify-content:center}
.btn-action{padding:12px 22px;font-size:15px;border-radius:10px;cursor:pointer;font-weight:700;border:none;display:flex;align-items:center;gap:8px}
.btn-pdf{background:#E8611A;color:#fff}
.btn-copy{background:#2A5FA8;color:#fff}
.btn-reset-partial{background:#fff;color:#E8611A;border:2px solid #E8611A}
.btn-reset-full{background:#fff;color:#c0392b;border:2px solid #c0392b}
.btn-edit{background:#fff;color:#2A5FA8;border:2px solid #2A5FA8}
.loading-overlay{display:none;position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:794px;height:100%;background:rgba(255,255,255,0.92);z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.loading-overlay.show{display:flex}
.spinner{width:44px;height:44px;border:4px solid #eee;border-top-color:#E8611A;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:15px;color:#555}
#pdf-template{display:none;position:fixed;top:-99999px;left:0;width:900px;background:#fff;font-family:Arial,sans-serif;color:#222;direction:rtl}
.confirm-overlay{display:none;position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:794px;height:100%;background:rgba(0,0,0,0.4);z-index:998;align-items:center;justify-content:center}
.confirm-overlay.show{display:flex}
.confirm-box{background:#fff;border-radius:12px;padding:24px;max-width:320px;width:90%;text-align:center}
.confirm-box h3{font-size:16px;margin-bottom:10px}
.confirm-box p{font-size:14px;color:#666;margin-bottom:18px}
.confirm-btns{display:flex;gap:10px;justify-content:center}
.email-note{background:#e8f4f8;border:1px solid #b3d9e8;border-radius:8px;padding:10px 14px;font-size:13px;color:#1a5f7a;margin-top:16px;text-align:center}
.step-indicator{display:flex;align-items:center;gap:4px;overflow-x:auto;padding:8px 16px;background:#fff;border-bottom:1px solid #eee;scrollbar-width:none}
.step-indicator::-webkit-scrollbar{display:none}
.step-dot{width:28px;height:28px;border-radius:50%;border:2px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:11px;color:#aaa;flex-shrink:0;cursor:pointer}
.step-dot.done{background:#E8611A;border-color:#E8611A;color:#fff}
.step-dot.active{border-color:#E8611A;color:#E8611A;font-weight:700}
.step-line{flex:1;height:2px;background:#eee;flex-shrink:0;min-width:8px}
.step-line.done{background:#E8611A}
@media(max-width:500px){
  body{font-size:13px}
  .card-group{grid-template-columns:1fr}
  .field-input,.textarea-field{font-size:14px}
  .btn{padding:10px 14px;font-size:13px}
  .summary-label{min-width:100px;font-size:11px}
}
</style>
</head>
<body>
<div class="page-wrapper">
<div class="loading-overlay" id="loading-overlay"><div class="spinner"></div><div class="loading-text" id="loading-text">מכין PDF...</div></div>
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <h3 id="confirm-title">אישור</h3>
    <p id="confirm-msg"></p>
    <div class="confirm-btns">
      <button class="btn btn-next" id="confirm-yes" style="flex:1"></button>
      <button class="btn btn-prev" id="confirm-no" style="flex:1"></button>
    </div>
  </div>
</div>

<div class="lang-bar">
  <span style="font-size:16px">🌐</span>
  <button class="lang-btn active" onclick="setLang('he')">עברית</button>
  <button class="lang-btn" onclick="setLang('en')">English</button>
  <button class="lang-btn" onclick="setLang('ru')">Русский</button>
</div>
<header>
  <img id="logo-img" alt="Cimatron" style="height:38px;object-fit:contain">
  <div class="header-title" id="hdr-title"></div>
  <div class="header-sub" id="hdr-sub"></div>
</header>
<div class="step-indicator" id="step-indicator"></div>
<div id="app-body"></div>
<div class="bottom-bar" id="bottom-bar">
  <button class="btn btn-next" id="btn-next" onclick="nextStep()"></button>
  <div class="pager" id="pager"></div>
  <button class="btn btn-prev" id="btn-prev" onclick="prevStep()"></button>
</div>
</div>
<div id="pdf-template"></div>

function t(k){return T[lang][k]||k}

function setLang(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${l}')"]`).classList.add('active');
  document.documentElement.lang=l;
  document.documentElement.dir=l==='he'?'rtl':'ltr';
  renderAll();
}

// ============ STEP LOGIC ============
function getSteps(){
  const mt=state.machineType;
  const steps=[1,2,3,4];
  // Step 5: machine config (not for mill3/other)
  if(mt&&mt!=='mill3'&&mt!=='other') steps.push(5);
  // Step 6: tool groups (mtm, swiss, latheMill, lathe)
  if(mt==='mtm'||mt==='swiss'||mt==='latheMill'||mt==='lathe') steps.push(6);
  // Step 7: assemblies (not swiss, not mill types)
  if(mt!=='swiss'&&mt!=='mill3'&&mt!=='mill4'&&mt!=='mill5'&&mt!=='other') steps.push(7);
  // Step 8: simulation (not mill3, not other)
  if(mt!=='other') steps.push(8);
  // Step 9: extra info
  steps.push(9);
  // Summary
  steps.push('s');
  return steps;
}

function getStepIndex(s){return getSteps().indexOf(s);}
function totalSteps(){return getSteps().length;}
function currentStepId(){return getSteps()[currentStep-1];}

// ============ RENDER ============
function renderAll(){
  document.getElementById('hdr-title').textContent=t('appTitle');
  document.getElementById('hdr-sub').textContent=t('appSub');
  renderStepIndicator();
  renderStep();
  renderNav();
}

function renderStepIndicator(){
  const steps=getSteps();
  const names={1:t('step1'),2:t('step2'),3:t('step3'),4:t('step4'),5:t('step5'),6:t('step6'),7:t('step7'),8:t('step8'),9:t('step9'),s:t('stepSummary')};
  let html='';
  steps.forEach((s,i)=>{
    const done=i<currentStep-1;
    const active=i===currentStep-1;
    html+=`<div class="step-dot ${done?'done':''} ${active?'active':''}" onclick="goToStep(${i+1})" title="${names[s]}">${done?'✓':i+1}</div>`;
    if(i<steps.length-1) html+=`<div class="step-line ${done?'done':''}"></div>`;
  });
  document.getElementById('step-indicator').innerHTML=html;
}

function goToStep(n){
  if(n<currentStep){currentStep=n;renderAll();}
}

function renderNav(){
  const sid=currentStepId();
  const isSummary=sid==='s';
  document.getElementById('bottom-bar').style.display=isSummary?'none':'flex';
  const isLast=currentStep===totalSteps()-1;
  const btn=document.getElementById('btn-next');
  btn.textContent=isLast?t('finish'):t('next');
  document.getElementById('btn-prev').textContent=t('prev');
  document.getElementById('btn-prev').style.visibility=currentStep>1?'visible':'hidden';
  document.getElementById('pager').textContent=`${totalSteps()-1} / ${Math.min(currentStep,totalSteps()-1)}`;
}

function renderStep(){
  const sid=currentStepId();
  const body=document.getElementById('app-body');
  if(sid==='s'){renderSummary(body);return;}
  let html='';
  if(sid===1) html=renderStep1();
  else if(sid===2) html=renderStep2();
  else if(sid===3) html=renderStep3();
  else if(sid===4) html=renderStep4();
  else if(sid===5) html=renderStep5();
  else if(sid===6) html=renderStep6();
  else if(sid===7) html=renderStep7();
  else if(sid===8) html=renderStep8();
  else if(sid===9) html=renderStep9();
  body.innerHTML=`<div class="step-content"><div class="intro-box" style="white-space:pre-line">${t('intro')}</div>${html}</div>`;
  bindEvents();
}

          ${radioOpt(`${key}Type`,'X',t('axisX'),state[`${key}Type`]==='X')}
          ${radioOpt(`${key}Type`,'Y',t('axisY'),state[`${key}Type`]==='Y')}
          ${radioOpt(`${key}Type`,'Z',t('axisZ'),state[`${key}Type`]==='Z')}
        </div>
        <div class="field-label" style="margin-top:8px">${t('tableOrHead')}<span class="required">*</span></div>

// ======= STEP 6: TOOL GROUPS =======
function renderStep6(){
  const mt=state.machineType;

  let html=`<p class="step-title">${t('step6')}</p>`;
  groups.forEach((g,gi)=>{

  </div>
  <div class="error-msg" id="err-toolGroups" style="margin-top:8px"></div>`;

function renderToolGroup(g,gi,isSwiss){
  const key=isSwiss?'swissToolGroups':'toolGroups';
  let html=`<div class="section-card" id="tg-${gi}">
    <div class="section-card-title">${t('toolGroupTitle')} ${gi+1}
      ${gi>0?`<button class="btn-remove-group" onclick="removeToolGroup(${gi},${isSwiss})">${t('removeToolGroup')}</button>`:''}
    </div>`;
  // Turret position
  html+=`<div class="field-group">
    <div class="field-label">${t('turretPos')}<span class="required">*</span></div>
    <div class="radio-group">
      ${radioOpt(`tg${gi}_pos`,'upper',t('posUpper'),g.pos==='upper',`updateTG(${gi},'pos','upper',${isSwiss})`)}
      ${radioOpt(`tg${gi}_pos`,'lower',t('posLower'),g.pos==='lower',`updateTG(${gi},'pos','lower',${isSwiss})`)}
    </div></div>`;
  // Turret or head
  html+=`<div class="field-group">
    <div class="field-label">${t('turretType')}<span class="required">*</span></div>
    <div class="radio-group">
      ${radioOpt(`tg${gi}_ttype`,'turret',t('typeTurret'),g.turretType==='turret',`updateTG(${gi},'turretType','turret',${isSwiss})`)}
      ${radioOpt(`tg${gi}_ttype`,'head',t('typeHead'),g.turretType==='head',`updateTG(${gi},'turretType','head',${isSwiss})`)}
    </div></div>`;
  // If turret
  if(g.turretType==='turret'){
    html+=`<div class="field-group">
      <div class="field-label">${t('hasAxisY')}<span class="required">*</span></div>
      <div class="radio-group">
        ${radioOpt(`tg${gi}_yax`,'yes',t('yesAxisY'),g.hasAxisY==='yes',`updateTG(${gi},'hasAxisY','yes',${isSwiss})`)}
        ${radioOpt(`tg${gi}_yax`,'no',t('noAxisY'),g.hasAxisY==='no',`updateTG(${gi},'hasAxisY','no',${isSwiss})`)}
      </div></div>
    <div class="field-group">
      <div class="field-label">${t('toolCount')}<span class="required">*</span></div>
      <input class="field-input" type="number" min="1" id="tg${gi}_toolCount" value="${g.toolCount||''}" oninput="updateTG(${gi},'toolCount',this.value,${isSwiss})" style="max-width:120px">
    </div>`;
    // MTM only: isMilling
    if(!isSwiss){
      html+=`<div class="field-group">
        <div class="field-label">${t('isMilling')}<span class="required">*</span></div>
        <div class="radio-group">
          ${radioOpt(`tg${gi}_mill`,'yes',t('yes'),g.isMilling==='yes',`updateTG(${gi},'isMilling','yes',${isSwiss})`)}
          ${radioOpt(`tg${gi}_mill`,'no',t('no'),g.isMilling==='no',`updateTG(${gi},'isMilling','no',${isSwiss})`)}
        </div></div>`;
    }
  }
  // Spindle capability (if MTM spindleCount>1)
  const showSpCap=!isSwiss&&parseInt(state.spindleCount)>1;
  if(showSpCap){
    html+=`<div class="field-group">
      <div class="field-label">${t('spindleCapability')}<span class="required">*</span></div>
      <div class="radio-group" style="flex-wrap:wrap">
        ${radioOpt(`tg${gi}_spcap`,'main',t('spMain'),g.spindleCapability==='main',`updateTG(${gi},'spindleCapability','main',${isSwiss})`)}
        ${radioOpt(`tg${gi}_spcap`,'sub',t('spSub'),g.spindleCapability==='sub',`updateTG(${gi},'spindleCapability','sub',${isSwiss})`)}
        ${radioOpt(`tg${gi}_spcap`,'both',t('spBoth'),g.spindleCapability==='both',`updateTG(${gi},'spindleCapability','both',${isSwiss})`)}
      </div>
      ${g.spindleCapability==='both'?`<textarea class="textarea-field" id="tg${gi}_spcapDesc" placeholder="${t('addDesc')}" oninput="updateTG(${gi},'spCapDesc',this.value,${isSwiss})">${g.spCapDesc||''}</textarea>
        ${fImagesGroup(`tg${gi}_spcapImages`,g.spCapImages||[],`updateTGImages(${gi},'spCapImages',this.files,${isSwiss})`)}`:''}
    </div>`;
  }
  // Swiss spindle capability always
  if(isSwiss){
    html+=`<div class="field-group">
      <div class="field-label">${t('spindleCapability')}<span class="required">*</span></div>
      <div class="radio-group" style="flex-wrap:wrap">
        ${radioOpt(`tg${gi}_spcap`,'main',t('spMain'),g.spindleCapability==='main',`updateTG(${gi},'spindleCapability','main',${isSwiss})`)}
        ${radioOpt(`tg${gi}_spcap`,'sub',t('spSub'),g.spindleCapability==='sub',`updateTG(${gi},'spindleCapability','sub',${isSwiss})`)}
        ${radioOpt(`tg${gi}_spcap`,'both',t('spBoth'),g.spindleCapability==='both',`updateTG(${gi},'spindleCapability','both',${isSwiss})`)}
      </div>
      ${g.spindleCapability==='both'?`<textarea class="textarea-field" placeholder="${t('addDesc')}" oninput="updateTG(${gi},'spCapDesc',this.value,${isSwiss})">${g.spCapDesc||''}</textarea>`:''}
    </div>`;
  }
  // Static tools
  html+=`<div class="field-group">
    <div class="field-label">${t('staticTools')}<span class="required">*</span></div>
    <input class="field-input" type="number" min="0" id="tg${gi}_static" value="${g.staticTools!==undefined?g.staticTools:''}" oninput="updateTG(${gi},'staticTools',this.value,${isSwiss})" style="max-width:120px">
    ${parseInt(g.staticTools)>0?`
    <div style="margin-top:8px">
      <div class="field-label">${t('staticToolNums')}</div>
      <input class="field-input" id="tg${gi}_staticNums" value="${g.staticToolNums||''}" oninput="updateTG(${gi},'staticToolNums',this.value,${isSwiss})">
    </div>
    ${renderToolDetails(g,'static',gi,isSwiss)}`:''}
  </div>`;
  // Rotating tools
  html+=`<div class="field-group">
    <div class="field-label">${t('rotatingTools')}<span class="required">*</span></div>
    <input class="field-input" type="number" min="0" id="tg${gi}_rot" value="${g.rotatingTools!==undefined?g.rotatingTools:''}" oninput="updateTG(${gi},'rotatingTools',this.value,${isSwiss})" style="max-width:120px">
    ${parseInt(g.rotatingTools)>0?`
    <div style="margin-top:8px">
      <div class="field-label">${t('rotatingToolNums')}</div>
      <input class="field-input" id="tg${gi}_rotNums" value="${g.rotatingToolNums||''}" oninput="updateTG(${gi},'rotatingToolNums',this.value,${isSwiss})">
    </div>
    ${renderToolDetails(g,'rotating',gi,isSwiss)}`:''}
  </div>`;
  // Extra description
  html+=`<div class="field-group">
    <div class="field-label">${t('groupExtraDesc')}<span class="required">*</span></div>
    <div class="radio-group">
      ${radioOpt(`tg${gi}_extdesc`,'yes',t('yes'),g.hasExtraDesc==='yes',`updateTG(${gi},'hasExtraDesc','yes',${isSwiss})`)}
      ${radioOpt(`tg${gi}_extdesc`,'no',t('no'),g.hasExtraDesc==='no',`updateTG(${gi},'hasExtraDesc','no',${isSwiss})`)}
    </div>
    ${g.hasExtraDesc==='yes'?`
    <textarea class="textarea-field" placeholder="${t('addDesc')}" oninput="updateTG(${gi},'extraDesc',this.value,${isSwiss})" style="margin-top:8px">${g.extraDesc||''}</textarea>
    ${fImagesGroup(`tg${gi}_extraImages`,g.extraImages||[],`updateTGImages(${gi},'extraImages',this.files,${isSwiss})`)}`:''}
  </div>`;
  html+='</div>';
  return html;
}

function renderToolDetails(g,type,gi,isSwiss){
  const prefix=type==='static'?'st':'rt';
  const dirKey=type==='static'?'staticToolDir':'rotatingToolDir';
  const fixKey=type==='static'?'staticHasFixture':'rotatingHasFixture';
  const fixturesKey=type==='static'?'staticFixtures':'rotatingFixtures';
  if(!g[fixturesKey]) g[fixturesKey]=[];
  let html=`
  <div class="field-group" style="margin-top:8px">
    <div class="field-label">${t('toolDirection')}<span class="required">*</span></div>
    <div class="radio-group" style="flex-wrap:wrap">
      ${radioOpt(`tg${gi}_${prefix}dir`,'diam',t('dirDiam'),g[dirKey]==='diam',`updateTG(${gi},'${dirKey}','diam',${isSwiss})`)}
      ${radioOpt(`tg${gi}_${prefix}dir`,'face',t('dirFace'),g[dirKey]==='face',`updateTG(${gi},'${dirKey}','face',${isSwiss})`)}
      ${radioOpt(`tg${gi}_${prefix}dir`,'5ax',t('dir5ax'),g[dirKey]==='5ax',`updateTG(${gi},'${dirKey}','5ax',${isSwiss})`)}
    </div>
  </div>
  <div class="field-group">
    <div class="field-label">${t('hasFixture')}<span class="required">*</span></div>
    <div class="radio-group">
      ${radioOpt(`tg${gi}_${prefix}fix`,'yes',t('yes'),g[fixKey]==='yes',`updateTG(${gi},'${fixKey}','yes',${isSwiss})`)}
      ${radioOpt(`tg${gi}_${prefix}fix`,'no',t('no'),g[fixKey]==='no',`updateTG(${gi},'${fixKey}','no',${isSwiss})`)}
    </div>
    ${g[fixKey]==='yes'?`
    <div style="margin-top:8px">
      ${g[fixturesKey].map((fx,fxi)=>`
      <div class="section-card" style="margin-bottom:8px">
        <div class="section-card-title">${t('deviceTitle')} ${fxi+1} <button class="btn-remove-group" onclick="removeFixture(${gi},'${fixturesKey}',${fxi},${isSwiss})">${t('removeDevice')}</button></div>
        <input class="field-input" placeholder="${t('fixtureType')}" value="${fx.type||''}" oninput="updateFixture(${gi},'${fixturesKey}',${fxi},'type',this.value,${isSwiss})" style="margin-bottom:6px">
        <textarea class="textarea-field" placeholder="${t('addDesc')}" oninput="updateFixture(${gi},'${fixturesKey}',${fxi},'desc',this.value,${isSwiss})">${fx.desc||''}</textarea>
        ${fImagesGroup(`tg${gi}_${prefix}fx${fxi}_img`,fx.images||[],`updateFixtureImages(${gi},'${fixturesKey}',${fxi},this.files,${isSwiss})`)}
      </div>`).join('')}
      <button class="btn-add-group" style="font-size:13px;padding:7px 14px" onclick="addFixture(${gi},'${fixturesKey}',${isSwiss})">+ ${t('addDevice')}</button>
    </div>`:''}
  </div>`;
  return html;
}

// ============ SUMMARY ============
function renderSummary(body){
  const s=state;
  let sections=[];
  // Section 1
  let s1=`${sr(t('company'),s.company)}${sr(t('contactName'),s.contactName)}${sr(t('phone'),s.phone)}${sr(t('email'),s.email||'–')}`;
  sections.push({title:t('step1'),body:s1});
  // Section 2
  sections.push({title:t('step2'),body:sr(t('softwareLabel'),s.software==='cimatron'?t('softwareCimatron'):t('softwareGibbs'))});
  // Section 3
  let s3=sr(t('machineName'),s.machineName)+imgRow(s.machineNameImages);
  s3+=sr(t('controllerName'),s.controllerName)+imgRow(s.controllerImages);
  s3+=sr(t('onSite'),s.onSite==='yes'?t('yes'):t('no'));
  if(s.onSite==='no') s3+=sr(t('expectedDate'),s.expectedDate);
  sections.push({title:t('step3'),body:s3});
  // Section 4
  const mtMap={lathe:t('typeLath'),latheMill:t('typeLathMill'),mtm:t('typeMTM'),swiss:t('typeSwiss'),mill3:t('typeMill3'),mill4:t('typeMill4'),mill5:t('typeMill5'),other:t('typeOther')};
  sections.push({title:t('step4'),body:sr(t('machineTypeLabel'),mtMap[s.machineType]||'')});
  // Section 5
  const mt=s.machineType;
  let s5='';
  if(mt==='lathe'||mt==='latheMill'){
    s5+=sr(t('turretPos'),s.turretPos==='upper'?t('posUpper'):t('posLower'));
    s5+=sr(t('turretType'),s.turretType==='turret'?t('typeTurret'):t('typeHead'));
    if(s.turretType==='turret'){s5+=sr(t('hasAxisY'),s.hasAxisY==='yes'?t('yesAxisY'):t('noAxisY'));s5+=sr(t('toolCount'),s.toolCount);}
  } else if(mt==='mtm'){
    s5+=sr(t('spindleCount'),s.spindleCount);
    if(parseInt(s.spindleCount)>1) s5+=sr(t('mtmSpecialLabel'),s.mtmSpecial==='yes'?t('yes')+': '+s.mtmSpecialDesc:t('no'));
  } else if(mt==='swiss'){
    s5+=sr(t('swissSpecialLabel'),s.swissSpecial==='yes'?t('yes')+': '+s.swissSpecialDesc:t('no'));
    s5+=imgRow(s.swissImages);
  } else if(mt==='mill4'){
    s5+=sr(t('mill4RotAxis'),s.mill4RotAxis);
  } else if(mt==='mill5'){
    s5+=sr(t('mill5Axis1'),`${s.mill5Axis1Type||''} – ${s.mill5Axis1Mount==='table'?t('tableAxis'):t('headAxis')}`);
    s5+=sr(t('mill5Axis2'),`${s.mill5Axis2Type||''} – ${s.mill5Axis2Mount==='table'?t('tableAxis'):t('headAxis')}`);
  }
  if(s5) sections.push({title:t('step5'),body:s5});
  // Section 6
  const groups=mt==='swiss'?s.swissToolGroups:s.toolGroups;
  if(groups.length){
    let s6='';
    groups.forEach((g,gi)=>{
      s6+=`<div style="font-weight:700;color:#E8611A;margin:8px 0 4px">${t('toolGroupTitle')} ${gi+1}</div>`;
      s6+=sr(t('turretPos'),g.pos==='upper'?t('posUpper'):t('posLower'));
      s6+=sr(t('turretType'),g.turretType==='turret'?t('typeTurret'):t('typeHead'));
      if(g.turretType==='turret'){s6+=sr(t('hasAxisY'),g.hasAxisY==='yes'?t('yesAxisY'):t('noAxisY'));s6+=sr(t('toolCount'),g.toolCount);}
      if(!mt==='swiss') s6+=sr(t('isMilling'),g.isMilling==='yes'?t('yes'):t('no'));
      if(g.spindleCapability) s6+=sr(t('spindleCapability'),{main:t('spMain'),sub:t('spSub'),both:t('spBoth')}[g.spindleCapability]);
      s6+=sr(t('staticTools'),g.staticTools);
      if(parseInt(g.staticTools)>0) s6+=sr(t('staticToolNums'),g.staticToolNums);
      s6+=sr(t('rotatingTools'),g.rotatingTools);
      if(parseInt(g.rotatingTools)>0) s6+=sr(t('rotatingToolNums'),g.rotatingToolNums);
      if(g.hasExtraDesc==='yes'){s6+=sr(t('groupExtraDesc'),g.extraDesc);s6+=imgRow(g.extraImages);}
    });
    sections.push({title:t('step6'),body:s6});
  }
  // Section 7
  if(mt!=='swiss'&&mt!=='mill3'&&mt!=='mill4'&&mt!=='mill5'&&mt!=='other'){
    let s7='';
    if(s.noAssemblies) s7+=sr(t('extraAssembliesLabel'),t('asmNone'));
    else {
      const asmLabels={stinger:t('asmStinger'),lunette:t('asmLunette'),fork:t('asmFork'),barFeeder:t('asmBarFeeder'),other:t('asmOther')};
      Object.entries(s.assemblies).forEach(([k,v])=>{if(v.sel){s7+=sr(asmLabels[k],v.desc);s7+=imgRow(v.images);}});
    }
    if(s7) sections.push({title:t('step7'),body:s7});
  }
  // Section 8
  if(mt!=='other'){
    let s8=sr(t('simulationLabel'),s.simulation==='yes'?t('yes'):t('no'));
    if(s.simulation==='yes') s8+=`<div class="notice-box" style="font-size:12px;margin-top:4px">${t('simulationNote')}</div>`;
    sections.push({title:t('step8'),body:s8});
  }
  // Section 9
  let s9=sr(t('extraInfoLabel'),s.extraInfo==='yes'?t('yes'):t('no'));
  if(s.extraInfo==='yes'){s9+=sr(t('extraInfoDesc'),s.extraInfoDesc);s9+=imgRow(s.extraInfoImages);}
  sections.push({title:t('step9'),body:s9});

  let html=`<div class="summary-wrap">
  <p class="step-title">${t('summaryTitle')}</p>
  ${sections.map(sec=>`<div class="summary-section"><div class="summary-section-title">${sec.title}</div>${sec.body}</div>`).join('')}
  <div class="email-note">✉ ${t('summaryEmail')}</div>
  <div class="action-bar">
    <button class="btn-action btn-pdf" onclick="doSavePDF()"><span>📄</span>${t('savePdfBtn')}</button>
    <button class="btn-action btn-copy" onclick="doCopyText()"><span>📋</span>${t('copyBtn')}</button>
    <button class="btn-action btn-edit" onclick="doEdit()"><span>✏️</span>${t('editBtn')}</button>
    <button class="btn-action btn-reset-partial" onclick="doResetPartial()"><span>↺</span>${t('resetPartialBtn')}</button>
    <button class="btn-action btn-reset-full" onclick="doResetFull()"><span>🗑</span>${t('resetFullBtn')}</button>
  </div>
  </div>`;
  body.innerHTML=html;
}

function sr(label,val){
  if(!val&&val!==0) return '';
  return `<div class="summary-row"><span class="summary-label">${label}</span><span class="summary-val">${val}</span></div>`;
}
function imgRow(imgs){
  if(!imgs||!imgs.length) return '';
  return `<div class="summary-img-row">${imgs.map(i=>`<img src="${i.data}" title="${i.name}">`).join('')}</div>`;
}

    <div class="field-label">${t(key)}${req?'<span class="required">*</span>':` <span style="color:#aaa;font-size:12px">${t('optional')}</span>`}</div>
    <input class="field-input" type="${type}" id="f-${key}" value="${val||''}" ${req?'required':''}>
    <div class="error-msg" id="err-${key}"></div>

    <div class="error-msg" id="err-${key}"></div>

}
function fImages(stateKey){
  const imgs=state[stateKey]||[];
  return `<label class="file-label">
    📷 ${t('addImage')}
    <input type="file" accept="image/*" capture="environment" multiple onchange="handleImages('${stateKey}',this.files)">
  </label>
  <div class="file-preview" id="fp-${stateKey}">${imgs.map(i=>`<div><img src="${i.data}"><div class="fp-name">${i.name}</div></div>`).join('')}</div>`;
}
function fImagesGroup(id,imgs,onchange){
  return `<label class="file-label">
    📷 ${t('addImage')}
    <input type="file" accept="image/*" capture="environment" multiple onchange="${onchange}">

}
function radioOpt(name,val,label,checked,onclick=''){
  const oc=onclick?`onclick="${onclick}"`:onclick===''?`onclick="setState('${name}','${val}');rerender()"`:'' ;
  return `<label class="radio-option ${checked?'selected':''}" ${oc}><input type="radio" name="${name}" value="${val}" ${checked?'checked':''}> ${label}</label>`;

// ============ BIND EVENTS ============
function bindEvents(){
  // Text inputs
  ['company','contactName','phone','email','machineName','controllerName','toolCount','expectedDate','extraInfoDesc','mtmSpecialDesc','swissSpecialDesc'].forEach(k=>{
    const el=document.getElementById(`f-${k}`);

function addFixture(gi,fixturesKey,isSwiss){

function removeFixture(gi,fixturesKey,fxi,isSwiss){

function updateFixture(gi,fixturesKey,fxi,field,val,isSwiss){

}
function updateFixtureImages(gi,fixturesKey,fxi,files,isSwiss){
  const arr=isSwiss?state.swissToolGroups:state.toolGroups;

}
function addToolGroup(isSwiss){
  const g={pos:'',turretType:'',hasAxisY:'',toolCount:'',spindleCapability:'',spCapDesc:'',spCapImages:[],staticTools:'',staticToolNums:'',rotatingTools:'',rotatingToolNums:'',staticToolDir:'',rotatingToolDir:'',staticHasFixture:'',rotatingHasFixture:'',staticFixtures:[],rotatingFixtures:[],isMilling:'',hasExtraDesc:'',extraDesc:'',extraImages:[]};
  if(isSwiss) state.swissToolGroups.push(g); else state.toolGroups.push(g);
  rerender();
}
function removeLastToolGroup(isSwiss){
  if(isSwiss){if(state.swissToolGroups.length>1) state.swissToolGroups.pop();}
  else{if(state.toolGroups.length>1) state.toolGroups.pop();}
  rerender();
}
function removeToolGroup(gi,isSwiss){
  if(isSwiss) state.swissToolGroups.splice(gi,1); else state.toolGroups.splice(gi,1);
  rerender();
}
function toggleAsm(key,event){
  if(event&&event.target&&event.target.tagName==='INPUT') {
    if(key==='none'){
      state.noAssemblies=event.target.checked;
      if(state.noAssemblies) Object.keys(state.assemblies).forEach(k=>state.assemblies[k].sel=false);
    } else {
      state.assemblies[key].sel=event.target.checked;
      if(state.assemblies[key].sel) state.noAssemblies=false;
    }
  } else {
    if(key==='none'){
      state.noAssemblies=!state.noAssemblies;
      if(state.noAssemblies) Object.keys(state.assemblies).forEach(k=>state.assemblies[k].sel=false);
    } else {
      state.assemblies[key].sel=!state.assemblies[key].sel;
      if(state.assemblies[key].sel) state.noAssemblies=false;
    }
  }
  rerender();
}

function handleImages(stateKey,files){
  readImages(files,imgs=>{state[stateKey]=(state[stateKey]||[]).concat(imgs);rerender();});
}
function readImages(files,cb){
  const arr=[];
  let done=0;
  if(!files||!files.length){cb([]);return;}
  Array.from(files).forEach(f=>{
    const fr=new FileReader();
    fr.onloadend=()=>{arr.push({name:f.name,data:fr.result});done++;if(done===files.length)cb(arr);};
    fr.readAsDataURL(f);
  });
}

// ============ VALIDATION ============
function validateStep(){
  let ok=true;
  const sid=currentStepId();
  const showErr=(id,msg)=>{const e=document.getElementById(id);if(e){e.textContent=msg;e.style.display='block';}ok=false;};
  const hideErr=(id)=>{const e=document.getElementById(id);if(e)e.style.display='none';};

  if(sid===1){
    ['company','contactName','phone'].forEach(k=>{
      const el=document.getElementById(`f-${k}`);
      if(!el||!el.value.trim()) showErr(`err-${k}`,t('errRequired')); else hideErr(`err-${k}`);
    });
  }
  if(sid===2){
    if(!state.software) showErr('err-software',t('errSelectOne')); else hideErr('err-software');
  }
  if(sid===3){
    ['machineName','controllerName'].forEach(k=>{
      const el=document.getElementById(`f-${k}`);
      if(!el||!el.value.trim()) showErr(`err-${k}`,t('errRequired')); else hideErr(`err-${k}`);
      else state[k]=el.value.trim();
    });
    if(!state.onSite) showErr('err-onSite',t('errSelectOne')); else hideErr('err-onSite');
    if(state.onSite==='no'){
      const el=document.getElementById('f-expectedDate');
      if(!el||!el.value) showErr('err-expectedDate',t('errRequired')); else{hideErr('err-expectedDate');state.expectedDate=el.value;}
    }
  }
  if(sid===4){
    if(!state.machineType) showErr('err-machineType',t('errSelectOne')); else hideErr('err-machineType');
  }
  if(sid===5){
    const mt=state.machineType;
    if(mt==='lathe'||mt==='latheMill'){
      if(!state.turretPos) showErr('err-turretPos',t('errSelectOne')); else hideErr('err-turretPos');
      if(!state.turretType) showErr('err-turretType',t('errSelectOne')); else hideErr('err-turretType');
      if(state.turretType==='turret'){
        if(!state.hasAxisY) showErr('err-hasAxisY',t('errSelectOne')); else hideErr('err-hasAxisY');
        const tc=document.getElementById('f-toolCount');
        if(!tc||!tc.value) showErr('err-toolCount',t('errRequired')); else{hideErr('err-toolCount');state.toolCount=tc.value;}
      }
    } else if(mt==='mtm'){
      if(!state.spindleCount) showErr('err-spindleCount',t('errSelectOne')); else hideErr('err-spindleCount');
      if(parseInt(state.spindleCount)>1&&!state.mtmSpecial) showErr('err-mtmSpecial',t('errSelectOne')); else hideErr('err-mtmSpecial');
    } else if(mt==='swiss'){
      if(!state.swissSpecial) showErr('err-swissSpecial',t('errSelectOne')); else hideErr('err-swissSpecial');
    } else if(mt==='mill4'){
      if(!state.mill4RotAxis) showErr('err-mill4RotAxis',t('errSelectOne')); else hideErr('err-mill4RotAxis');
    } else if(mt==='mill5'){
      if(!state.mill5Axis1Type) showErr('err-mill5Axis1Type',t('errSelectOne')); else hideErr('err-mill5Axis1Type');
      if(!state.mill5Axis2Type) showErr('err-mill5Axis2Type',t('errSelectOne'));
    }
  }
  if(sid===6){
    const isSwiss=state.machineType==='swiss';
    const groups=isSwiss?state.swissToolGroups:state.toolGroups;
    if(!groups.length){showErr('err-toolGroups',t('errAddGroup'));ok=false;}
    else hideErr('err-toolGroups');
  }
  if(sid===7){
    const anySelected=state.noAssemblies||Object.values(state.assemblies).some(a=>a.sel);
    if(!anySelected) showErr('err-assemblies',t('errSelectOne')); else hideErr('err-assemblies');
  }
  if(sid===8){
    if(!state.simulation) showErr('err-simulation',t('errSelectOne')); else hideErr('err-simulation');
  }
  if(sid===9){
    if(!state.extraInfo) showErr('err-extraInfo',t('errSelectOne')); else hideErr('err-extraInfo');
  }
  return ok;
}

// ============ NAVIGATION ============
function nextStep(){
  // Save text inputs before validation
  saveCurrent();
  if(!validateStep()) return;
  currentStep++;
  renderAll();
  window.scrollTo(0,0);
}
function prevStep(){
  if(currentStep>1){currentStep--;renderAll();window.scrollTo(0,0);}
}
function saveCurrent(){
  const sid=currentStepId();
  if(sid===1){
    ['company','contactName','phone','email'].forEach(k=>{const el=document.getElementById(`f-${k}`);if(el)state[k]=el.value;});
  }
  if(sid===3){
    ['machineName','controllerName','expectedDate'].forEach(k=>{const el=document.getElementById(`f-${k}`);if(el)state[k]=el.value;});
  }
  if(sid===5){
    const el=document.getElementById('f-toolCount');if(el)state.toolCount=el.value;
    const el2=document.getElementById('f-mtmSpecialDesc');if(el2)state.mtmSpecialDesc=el2.value;
    const el3=document.getElementById('f-swissSpecialDesc');if(el3)state.swissSpecialDesc=el3.value;
  }
  if(sid===9){
    const el=document.getElementById('f-extraInfoDesc');if(el)state.extraInfoDesc=el.value;
  }
}

function doCopyText(){
  const s=state;
  const mt=s.machineType;
  const mtMap={lathe:t('typeLath'),latheMill:t('typeLathMill'),mtm:t('typeMTM'),swiss:t('typeSwiss'),mill3:t('typeMill3'),mill4:t('typeMill4'),mill5:t('typeMill5'),other:t('typeOther')};
  let txt=`=== ${t('summaryTitle')} ===\n\n`;
  txt+=`${t('company')}: ${s.company}\n${t('contactName')}: ${s.contactName}\n${t('phone')}: ${s.phone}\n${t('email')}: ${s.email||'–'}\n\n`;
  txt+=`${t('softwareLabel')}: ${s.software==='cimatron'?t('softwareCimatron'):t('softwareGibbs')}\n\n`;
  txt+=`${t('machineName')}: ${s.machineName}\n${t('controllerName')}: ${s.controllerName}\n${t('onSite')}: ${s.onSite==='yes'?t('yes'):t('no')}\n`;
  if(s.onSite==='no') txt+=`${t('expectedDate')}: ${s.expectedDate}\n`;
  txt+=`\n${t('machineTypeLabel')}: ${mtMap[mt]||''}\n`;
  if(mt==='lathe'||mt==='latheMill'){txt+=`${t('turretPos')}: ${s.turretPos}\n${t('turretType')}: ${s.turretType}\n`;}
  if(s.simulation) txt+=`\n${t('simulationLabel')}: ${s.simulation==='yes'?t('yes'):t('no')}\n`;
  txt+=`\n${t('summaryEmail')}`;
  navigator.clipboard.writeText(txt).then(()=>{
    const btn=document.querySelector('.btn-copy');
    if(btn){const orig=btn.innerHTML;btn.innerHTML=`✓ ${t('copied')}`;setTimeout(()=>btn.innerHTML=orig,2000);}
  });
}

// ============ PDF ============
let savedPdfBlob=null,savedFilename='';

function buildPdfHTML(){
  const s=state;
  const dir=lang==='he'?'rtl':'ltr';
  const orange='#E8611A';
  const logo=logoBase64?`<img src="${logoBase64}" style="height:36px" alt="Cimatron">`:'<span style="color:#fff;font-weight:700">cimatron</span>';
  const mt=s.machineType;
  const mtMap={lathe:t('typeLath'),latheMill:t('typeLathMill'),mtm:t('typeMTM'),swiss:t('typeSwiss'),mill3:t('typeMill3'),mill4:t('typeMill4'),mill5:t('typeMill5'),other:t('typeOther')};
  const hdr=`<div style="background:${orange};padding:16px 28px;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px"><div><div style="color:#fff;font-size:20px;font-weight:700">${t('appTitle')}</div><div style="color:#ffe0cc;font-size:13px;margin-top:2px">${t('appSub')}</div></div>${logo}</div>`;
  const sec=(txt)=>`<div style="background:${orange};color:#fff;display:inline-block;padding:5px 14px;border-radius:5px;font-size:13px;font-weight:700;margin:14px 0 10px">${txt}</div>`;
  const row=(l,v)=>v?`<div style="display:flex;gap:10px;margin-bottom:6px;font-size:13px"><span style="color:#999;min-width:150px;flex-shrink:0;font-size:12px">${l}</span><span style="color:#222;flex:1">${v}</span></div>`:'';
  const ftr=`<div style="border-top:1px solid #eee;padding:10px 32px;margin-top:20px;font-size:11px;color:#bbb;display:flex;justify-content:space-between"><span>${t('pdfCreatedFor')}</span><span>${t('dateLabel')}: ${new Date().toLocaleDateString()}</span></div>`;

  let content='';
  content+=sec(t('step1'));
  content+=row(t('company'),s.company)+row(t('contactName'),s.contactName)+row(t('phone'),s.phone)+row(t('email'),s.email);
  content+=sec(t('step2'));
  content+=row(t('softwareLabel'),s.software==='cimatron'?t('softwareCimatron'):t('softwareGibbs'));
  content+=sec(t('step3'));
  content+=row(t('machineName'),s.machineName)+row(t('controllerName'),s.controllerName)+row(t('onSite'),s.onSite==='yes'?t('yes'):t('no'));
  if(s.onSite==='no') content+=row(t('expectedDate'),s.expectedDate);
  content+=sec(t('step4'));
  content+=row(t('machineTypeLabel'),mtMap[mt]||'');
  if(mt==='lathe'||mt==='latheMill'){
    content+=sec(t('step5'));
    content+=row(t('turretPos'),s.turretPos)+row(t('turretType'),s.turretType)+row(t('hasAxisY'),s.hasAxisY)+row(t('toolCount'),s.toolCount);
  } else if(mt==='mtm'){
    content+=sec(t('step5'));
    content+=row(t('spindleCount'),s.spindleCount);
    if(parseInt(s.spindleCount)>1) content+=row(t('mtmSpecialLabel'),s.mtmSpecial==='yes'?`${t('yes')}: ${s.mtmSpecialDesc}`:t('no'));
  }
  const groups=mt==='swiss'?s.swissToolGroups:s.toolGroups;
  if(groups.length){
    content+=sec(t('step6'));
    groups.forEach((g,gi)=>{
      content+=`<div style="font-weight:700;color:${orange};margin:8px 0 4px">${t('toolGroupTitle')} ${gi+1}</div>`;
      content+=row(t('turretPos'),g.pos)+row(t('turretType'),g.turretType)+row(t('toolCount'),g.toolCount)+row(t('staticTools'),g.staticTools)+row(t('rotatingTools'),g.rotatingTools);
      if(g.hasExtraDesc==='yes') content+=row(t('groupExtraDesc'),g.extraDesc);
    });
  }
  if(mt!=='swiss'&&mt!=='mill3'&&mt!=='mill4'&&mt!=='mill5'&&mt!=='other'){
    content+=sec(t('step7'));
    if(s.noAssemblies) content+=row(t('extraAssembliesLabel'),t('asmNone'));
    else {
      const asmLabels={stinger:t('asmStinger'),lunette:t('asmLunette'),fork:t('asmFork'),barFeeder:t('asmBarFeeder'),other:t('asmOther')};
      Object.entries(s.assemblies).forEach(([k,v])=>{if(v.sel)content+=row(asmLabels[k],v.desc||'✓');});
    }
  }
  if(mt!=='other'){content+=sec(t('step8'));content+=row(t('simulationLabel'),s.simulation==='yes'?t('yes'):t('no'));}
  content+=sec(t('step9'));
  content+=row(t('extraInfoLabel'),s.extraInfo==='yes'?t('yes'):t('no'));
  if(s.extraInfo==='yes') content+=row(t('extraInfoDesc'),s.extraInfoDesc);
  content+=`<div style="margin-top:16px;background:#e8f4f8;border:1px solid #b3d9e8;border-radius:6px;padding:10px;font-size:12px;color:#1a5f7a">✉ ${t('summaryEmail')}</div>`;

  return `<div style="width:900px;background:#fff;font-family:Arial,sans-serif;direction:${dir};padding:0 32px 32px">${hdr}${content}${ftr}</div>`;
}

async function doSavePDF(){
  const overlay=document.getElementById('loading-overlay');
  document.getElementById('loading-text').textContent=t('loading');
  overlay.classList.add('show');
  const tmpl=document.getElementById('pdf-template');
  tmpl.innerHTML=buildPdfHTML();
  tmpl.style.display='block';
  tmpl.style.top='-99999px';
  await new Promise(r=>setTimeout(r,500));
  try{
    const {jsPDF}=window.jspdf;
    const SCALE=2.5,A4W=210,A4H=297,PX_MM=900/A4W;
    const pageH=A4H*PX_MM;
    const canvas=await html2canvas(tmpl.children[0],{scale:SCALE,useCORS:true,backgroundColor:'#ffffff',logging:false,width:900});
    const totalH=canvas.height/SCALE;
    const pages=Math.ceil(totalH/pageH);
    const pdf=new jsPDF({orientation:'p',unit:'mm',format:'a4'});
    for(let i=0;i<pages;i++){
      if(i>0)pdf.addPage();
      const sy=i*pageH*SCALE,sh=Math.min(pageH*SCALE,canvas.height-sy);
      const pc=document.createElement('canvas');pc.width=canvas.width;pc.height=pageH*SCALE;
      const ctx=pc.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,pc.width,pc.height);
      ctx.drawImage(canvas,0,sy,canvas.width,sh,0,0,canvas.width,sh);
      pdf.addImage(pc.toDataURL('image/jpeg',0.85),'JPEG',0,0,A4W,A4H);
    }
    const blob=pdf.output('blob');
    const name=`איפיון-פוסט-${state.company||'cimatron'}.pdf`.replace(/\s+/g,'-');
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=name;a.click();
    setTimeout(()=>URL.revokeObjectURL(url),2000);
  }catch(e){console.error(e);alert('שגיאה ביצירת PDF');}
  finally{tmpl.style.display='none';overlay.classList.remove('show');}
}
